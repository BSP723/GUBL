<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Trustlines Linked to Issuer</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  button {
    padding: 8px 16px;
    margin-top: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
  }
</style>
</head>
<body>
<h1>Trustlines Linked to Issuer</h1>
<p>Issuer Address: <strong id="issuerAddress">rG47hi9xKvEhjCD8LXhfxjRzuEEBxwGUbL</strong></p>
<button id="fetchBtn">Fetch Trustlines</button>

<h2>Wallets and Balances</h2>
<table>
  <thead>
    <tr>
      <th>Number</th>
      <th>Wallets</th>
      <th>Balance</th>
    </tr>
  </thead>
  <tbody id="resultsBody"></tbody>
</table>

<script>
const issuerAddress = 'rG47hi9xKvEhjCD8LXhfxjRzuEEBxwGUbL';

document.getElementById('fetchBtn').onclick = async () => {
  const tbody = document.getElementById('resultsBody');
  tbody.innerHTML = '';

  try {
    // Call XRPL Data API to get trustlines by issuer
    const response = await fetch(`https://data.ripple.com/v2/accounts/${issuerAddress}/trustlines`);
    const data = await response.json();

    if (data.trustlines && data.trustlines.length > 0) {
      data.trustlines.forEach((line, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${line.account}</td>
          <td>${line.limit}</td>
        `;
        tbody.appendChild(row);
      });
    } else {
      alert('No trustlines found or error fetching data.');
    }
  } catch (err) {
    console.error(err);
    alert('Error fetching trustlines. See console for details.');
  }
};
</script>
</body>
</html>
