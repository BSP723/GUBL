<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XRPL Wallet Balance & Trustlines Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/xrpl/dist/xrpl.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    input {
      width: 400px;
      padding: 8px;
      margin-right: 10px;
    }
    button {
      padding: 8px 16px;
    }
    #results {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>XRPL Wallet Balance & Trustlines</h1>
  <p>
    Enter your XRPL wallet address and click "Check Balance". 
    Replace the placeholders for your token's currency code and wallet address.
  </p>
  <label for="walletAddress">Wallet Address:</label>
  <input type="text" id="walletAddress" placeholder="Enter your XRPL address" />
  <br /><br />
  <label for="currencyCode">Token Currency Code:</label>
  <input type="text" id="currencyCode" placeholder="e.g., XYZ" />
  <br /><br />
  <button id="checkBtn">Check Balance</button>

  <div id="results">
    <h2>Results</h2>
    <p>XRPL Balance: <span id="xrpBalance">-</span></p>
    <p>Trustlines:</p>
    <ul id="trustlines"></ul>
    <p>Token Balance (Issuer: rG47hi9xKvEhjCD8LXhfxjRzuEEBxwGUbL): <span id="tokenBalance">-</span></p>
  </div>

  <script>
    document.getElementById('checkBtn').onclick = async () => {
      const address = document.getElementById('walletAddress').value.trim();
      const currencyCode = document.getElementById('currencyCode').value.trim();

      if (!address || !currencyCode) {
        alert('Please enter both wallet address and token currency code.');
        return;
      }

      const client = new xrpl.Client('wss://s1.ripple.com'); // Mainnet WebSocket
      await client.connect();

      try {
        // Fetch account info
        const accountInfo = await client.request({
          command: 'account_info',
          account: address,
          ledger_index: 'validated'
        });

        // XRP Balance
        const xrpBalance = accountInfo.result.account_data.Balance / 1000000; // drops to XRP
        document.getElementById('xrpBalance').textContent = xrpBalance + ' XRP';

        // Fetch trustlines
        const trustlinesResponse = await client.request({
          command: 'account_lines',
          account: address,
          ledger_index: 'validated'
        });

        // Clear previous trustlines
        const trustlinesList = document.getElementById('trustlines');
        trustlinesList.innerHTML = '';

        trustlinesResponse.result.lines.forEach(line => {
          const li = document.createElement('li');
          li.textContent = `Currency: ${line.currency}, Limit: ${line.limit}, Balance: ${line.balance}, Issuer: ${line.account}`;
          trustlinesList.appendChild(li);
        });

        // Fetch balance of specific token issued by the issuer
        const tokenLine = trustlinesResponse.result.lines.find(
          line => line.currency === currencyCode && line.account === 'rG47hi9xKvEhjCD8LXhfxjRzuEEBxwGUbL'
        );

        const tokenBalance = tokenLine ? tokenLine.balance : '0';

        document.getElementById('tokenBalance').textContent = tokenBalance;

      } catch (error) {
        console.error(error);
        alert('Error fetching data. Make sure the address is correct.');
      } finally {
        await client.disconnect();
      }
    };
  </script>
</body>
</html>
