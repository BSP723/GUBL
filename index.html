<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>XRPL Trustlines for Issuer</title>
<script src="https://cdn.jsdelivr.net/npm/xrpl/dist/xrpl.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  button {
    padding: 8px 16px;
    margin-top: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
  }
</style>
</head>
<body>
<h1>XRPL Trustlines for Issuer</h1>
<p>Issuer Address: <strong id="issuerAddress">rG47hi9xKvEhjCD8LXhfxjRzuEEBxwGUbL</strong></p>
<button id="fetchBtn">Fetch Trustlines</button>

<h2>Wallets and Balances</h2>
<table>
  <thead>
    <tr>
      <th>Number</th>
      <th>Wallets</th>
      <th>Balance</th>
    </tr>
  </thead>
  <tbody id="resultsBody"></tbody>
</table>

<script>
const issuerAddress = 'rG47hi9xKvEhjCD8LXhfxjRzuEEBxwGUbL';
const client = new xrpl.Client('wss://s1.ripple.com');

document.getElementById('fetchBtn').onclick = async () => {
  await client.connect();
  const tbody = document.getElementById('resultsBody');
  tbody.innerHTML = '';

  try {
    // Fetch all trustlines issued by the issuer
    let marker = undefined;
    const allTrustlines = [];

    do {
      const response = await client.request({
        command: 'account_lines',
        account: issuerAddress,
        ledger_index: 'validated',
        limit: 400,
        marker: marker
      });
      allTrustlines.push(...response.result.lines);
      marker = response.result.marker;
    } while (marker);

    // Filter trustlines to only those with the issuer address
    const filteredTrustlines = allTrustlines.filter(
      l => l.account === issuerAddress
    );

    // For each trustline, get the counterparty address
    for (let i = 0; i < filteredTrustlines.length; i++) {
      const line = filteredTrustlines[i];
      const walletAddress = line.account;
      const balance = line.balance;

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${i + 1}</td>
        <td>${walletAddress}</td>
        <td>${balance}</td>
      `;
      tbody.appendChild(row);
    }
  } catch (err) {
    console.error(err);
    alert('Error fetching trustlines. See console for details.');
  } finally {
    await client.disconnect();
  }
};
</script>
</body>
</html>
